name: flutter_money_tracking_app
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  # ตรงนี้คือที่สำหรับเพิ่ม supabase
  supabase_flutter: ^2.5.2
  cupertino_icons: ^1.0.6
  google_fonts: ^8.0.2
  font_awesome_flutter: ^11.0.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  # บรรทัดนี้ต้องเยื้องเข้าไป 2 ช่องจากคำว่า flutter:
  uses-material-design: true

  # และถ้ามี assets ต้องเยื้องแบบนี้
  assets:
    - assets/images/